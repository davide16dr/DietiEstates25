version: 1
applications:
  - appRoot: Frontend-DietiEstates25
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
            # Load environment variables from .env.production for production builds
            - if [ -f .env.production ]; then export $(cat .env.production | xargs); fi
        build:
          commands:
            - npm run build -- --configuration=production
      artifacts:
        baseDirectory: dist/Frontend-DietiEstates25/browser
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
