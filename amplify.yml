version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd Frontend-DietiEstates25 && npm ci
    build:
      commands:
        - cd Frontend-DietiEstates25 && npm run build -- --configuration=production
  artifacts:
    baseDirectory: Frontend-DietiEstates25/dist/Frontend-DietiEstates25/browser
    files:
      - '**/*'
  cache:
    paths:
      - Frontend-DietiEstates25/node_modules/**/*
