name: SonarCloud Backend Analysis

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Backend-DietiEstates25/**'
      - '.github/workflows/sonarcloud-backend.yml'
      - 'sonar-project.properties'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'Backend-DietiEstates25/**'

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      
      - name: Build & Test Backend (JaCoCo)
        run: |
          cd Backend-DietiEstates25
          mvn -B clean verify
      
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        with:
          args: >
            -Dsonar.projectKey=davide16dr_DietiEstates25
            -Dsonar.organization=davide16dr
            -Dsonar.sources=Backend-DietiEstates25/src/main/java
            -Dsonar.tests=Backend-DietiEstates25/src/test/java
            -Dsonar.java.binaries=Backend-DietiEstates25/target/classes
            -Dsonar.exclusions=Frontend-DietiEstates25/**,node_modules/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      
      - name: Quality Gate Check
        run: echo "✅ SonarCloud Backend analysis completed!"
