<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>FrontendDietiEstates25</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- 🔧 Polyfill per sockjs-client: definisce 'global' per compatibilità browser -->
  <script>
    window.global = window;
  </script>

  <!-- ✅ Google Maps API con Places e Geometry -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD0uk6UxgGRBC0aqQm96F1oG0R1ZMs1Usg&libraries=places,geometry&callback=initGoogleMaps" async defer></script>
  <script>
    // Callback globale per confermare che Google Maps è caricato
    function initGoogleMaps() {
      console.log('✅ Google Maps caricato con successo dall\'index.html');
    }
  </script>

  <!-- ── OAuth Social Login SDK ──────────────────────────────────────────── -->
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Facebook JS SDK -->
  <script async defer crossorigin="anonymous"
    src="https://connect.facebook.net/it_IT/sdk.js"></script>
  <!-- GitHub non ha SDK browser: usa il flusso popup implementato in OAuthService -->
</head>
